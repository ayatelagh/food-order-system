version: '3.9'

services:

  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"

  item-service:
    build: ./foodservice
    ports:
      - "9001:9001"
    depends_on:
      - service-registry

  order-service:
    build: ./order_service
    ports:
      - "9002:9002"
    depends_on:
      - service-registry
      - item-service

  cloud-getaway:
    build: ./cloud-getaway
    ports:
      - "1919:1919"
    depends_on:
      - service-registry
      - item-service
      - order-service